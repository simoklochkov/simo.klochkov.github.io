<!DOCTYPE html>

<html lang="fi">

<head>
    <meta charset="UTF-8">
    <title>Lomaketehtävä</title>
</head>

<body>
    <form>
        <table>
            <tr>
                <td>
                    <fieldset>
                        <legend>Contact information</legend>

                        <table>
                            <tr>
                                <!-- etunimi-->
                                <td><label for="fname">First name:</label></td> -->
                                <td><input type="text" id="fname" name="fname"></td>

                                <!-- chekcboxit emailille ja puhelinnumerolle.-->

                                <td rowspan="4" style="vertical-align: top; padding-left: 20px;">
                                    <p style="margin-top: 0;">Preferred contact method:</p>

                                    <input type="checkbox" id="contact_email" name="contact_email">
                                    <label for contact_email>Email</label>
                                    <br><br>

                                    <input type="checkbox" id="contact_phone" name="contact_phone">
                                    <label for contact_phone>Telephone</label>
                                </td>
                            </tr>

                            <tr>
                                <!-- sukunimi-->
                                <td><label for="lname">Last name:</label></td>
                                <td><input type="text" id="lname" name="lname"></td>
                            </tr>

                            <tr>
                                <!-- sähköposti-->
                                <td><label for="email">Email:</label></td>
                                <td><input type="email" id="email" name="email"></td>
                            </tr>

                            <tr>
                                <!-- puhelinnumero-->
                                <td><label for="phone">Telephone:</label></td>
                                <td><input type="tel" id="phone" name="phone"></td>
                            </tr>
                        </table>
                    </fieldset>
                </td>
            </tr>

            <tr>
                <td>
                    <fieldset> <!-- fieldset palaute osiolle-->
                        <legend>Feedback:</legend>

                        <label for="subject">Message subject:</label>
                        <input type="text" id="subject" name="subject">
                        <br><br>

                        <!-- tekstialue palautteen kirjoittamiselle-->

                        <textarea id="feedback" name="feedback" rows="14" cols="50"></textarea>
                        <br><br>

                        <label for="file"> Attach a file:</label>
                        <input type="file" id="file" name="file">
                        <br><br>


                        <input type="submit" value="Send">

                    </fieldset>
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
